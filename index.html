<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Content Radar — Tidlor</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --bd:#222;--bd2:#2c2c2c;
  --green:#00c896;--gd:#009d77;--gdim:rgba(0,200,150,.1);
  --amber:#f5a623;--adim:rgba(245,166,35,.1);
  --purple:#8b7cf8;--pdim:rgba(139,124,248,.1);
  --coral:#ff6b6b;--cdim:rgba(255,107,107,.1);
  --blue:#4da6ff;--bdim2:rgba(77,166,255,.1);
  --tx:#e2e0da;--tx2:#888;--tx3:#4a4a4a;
  --mono:'IBM Plex Mono',monospace;--sans:'Sarabun',sans-serif;
  --r:6px;--r2:10px;--r3:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}

/* HEADER */
header{border-bottom:1px solid var(--bd);padding:0 24px;height:50px;display:flex;align-items:center;gap:14px;position:sticky;top:0;background:rgba(12,12,12,.97);backdrop-filter:blur(16px);z-index:100}
.logo{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--green);letter-spacing:.08em}
.logo em{color:var(--tx3);font-style:normal}
.kw-sel-wrap{display:flex;gap:8px;align-items:center;flex:1;max-width:500px}
.kw-sel-wrap label{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
select{background:var(--s2);border:1px solid var(--bd2);color:var(--tx);padding:6px 10px;border-radius:var(--r);font-size:12px;font-family:var(--sans);outline:none;flex:1}
select:focus{border-color:var(--green)}
.gbtn{background:var(--green);color:#000;border:none;padding:7px 18px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:background .15s;white-space:nowrap}
.gbtn:hover{background:var(--gd)}
.gbtn:disabled{background:var(--s3);color:var(--tx3);cursor:not-allowed}
.nav{display:flex;gap:2px;margin-left:auto}
.nb{background:none;border:none;color:var(--tx2);font-size:11px;font-family:var(--sans);padding:5px 12px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.nb:hover{color:var(--tx);background:var(--s2)}
.nb.on{color:var(--green);background:var(--gdim)}
.rbtn{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2);font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:var(--r);cursor:pointer}
.rbtn:hover{color:var(--green);border-color:var(--green)}

/* MAIN */
main{max-width:1360px;margin:0 auto;padding:20px 24px}
.pg{display:none}.pg.on{display:block}

/* SECTION LABEL */
.sec-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:var(--r);display:inline-flex;align-items:center;gap:6px;margin-bottom:10px}
.sl-green{background:var(--gdim);color:var(--green);border:1px solid rgba(0,200,150,.2)}
.sl-purple{background:var(--pdim);color:var(--purple);border:1px solid rgba(139,124,248,.2)}
.sl-amber{background:var(--adim);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.sl-coral{background:var(--cdim);color:var(--coral);border:1px solid rgba(255,107,107,.2)}
.sl-blue{background:var(--bdim2);color:var(--blue);border:1px solid rgba(77,166,255,.2)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}

/* PANEL BOX */
.box{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px}

/* CHIPS — Related Searches */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:5px 12px;font-size:12px;color:var(--tx2);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--green);color:var(--green);background:var(--gdim)}

/* PAA */
.paa-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);align-items:flex-start;cursor:pointer}
.paa-item:last-child{border-bottom:none}
.paa-item:hover .paa-q{color:var(--green)}
.paa-num{font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:1px;flex-shrink:0}
.paa-q{font-size:13px;font-weight:500;color:var(--tx);transition:color .15s}

/* AEO */
.aeo-item{padding:12px 14px;border-left:2px solid var(--green);background:var(--gdim);border-radius:0 var(--r) var(--r) 0;margin-bottom:9px}
.aeo-q{font-size:11px;font-weight:700;color:var(--green);margin-bottom:5px;letter-spacing:.02em}
.aeo-q::before{content:"Q: "}
.aeo-a{font-size:12px;color:var(--tx2);line-height:1.75}
.aeo-a::before{content:"A: ";color:var(--tx3);font-weight:700}

/* PAIN POINTS */
.pain-item{display:flex;gap:10px;padding:8px 0;align-items:flex-start;border-bottom:1px solid var(--bd)}
.pain-item:last-child{border-bottom:none}
.pain-dot{width:4px;height:4px;background:var(--coral);border-radius:50%;flex-shrink:0;margin-top:6px}
.pain-text{font-size:13px;color:var(--tx2);line-height:1.5}

/* TOP RESULTS */
.result-item{padding:10px 0;border-bottom:1px solid var(--bd)}
.result-item:last-child{border-bottom:none}
.result-title{font-size:13px;font-weight:500;color:var(--blue);cursor:pointer;margin-bottom:3px}
.result-title a{color:inherit;text-decoration:none}
.result-title a:hover{color:var(--green)}
.result-domain{font-size:10px;font-family:var(--mono);color:var(--tx3);margin-bottom:3px}
.result-snippet{font-size:12px;color:var(--tx2);line-height:1.6}

/* NEWS */
.news-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);align-items:flex-start}
.news-item:last-child{border-bottom:none}
.news-label{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--adim);color:var(--amber);white-space:nowrap;flex-shrink:0;letter-spacing:.03em;margin-top:2px}
.news-t{font-size:13px;font-weight:500;color:var(--tx)}
.news-t a{color:inherit;text-decoration:none}
.news-t a:hover{color:var(--green)}
.news-src{font-size:11px;color:var(--tx3);margin-top:2px}
.use-hook{font-size:10px;padding:3px 8px;border:1px solid var(--bd2);border-radius:var(--r);background:none;color:var(--tx2);cursor:pointer;margin-top:4px;font-family:var(--sans);transition:all .15s;display:inline-block}
.use-hook:hover{border-color:var(--amber);color:var(--amber)}

/* SCRIPT PAGE */
.pillar-wrap{margin-bottom:20px}
.pillar-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.pillar-title{font-size:15px;font-weight:600;color:var(--tx)}
.pillar-topic{font-size:12px;color:var(--tx2);margin-left:4px}

.gen-toggle{display:flex;gap:4px;margin-left:auto}
.gtab{padding:4px 14px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd2);color:var(--tx2);background:none;font-family:var(--sans);transition:all .15s}
.gtab.on{background:var(--s3);color:var(--tx);border-color:var(--bd)}
.gpanel{display:none}.gpanel.on{display:block}

.script-grid{display:grid;grid-template-columns:auto 1fr;gap:0;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.script-row{display:contents}
.script-row-label{background:var(--s2);border-bottom:1px solid var(--bd);border-right:1px solid var(--bd);padding:10px 12px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);display:flex;align-items:flex-start;white-space:nowrap}
.script-row-val{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 14px;font-size:13px;color:var(--tx);line-height:1.75}
.script-row:last-child .script-row-label,
.script-row:last-child .script-row-val{border-bottom:none}
.hook-val{font-size:14px;font-weight:600;color:var(--tx);border-left:3px solid var(--amber);padding-left:12px;line-height:1.55}
.script-val{color:var(--tx2);white-space:pre-wrap;font-size:12px}
.kw-val{display:flex;flex-wrap:wrap;gap:5px}
.kw-pill{font-size:11px;font-family:var(--mono);background:var(--bdim2);color:var(--blue);padding:2px 8px;border-radius:3px}
.hash-val{display:flex;flex-wrap:wrap;gap:5px}
.hash-pill{font-size:11px;font-family:var(--mono);background:var(--pdim);color:var(--purple);padding:2px 8px;border-radius:3px}

.copy-row{padding:8px 14px;background:var(--s2);display:flex;gap:8px;align-items:center;border-top:1px solid var(--bd)}
.cpybtn{font-size:10px;padding:3px 10px;border:1px solid var(--bd2);border-radius:var(--r);background:none;color:var(--tx2);cursor:pointer;font-family:var(--mono);transition:all .15s}
.cpybtn:hover{border-color:var(--green);color:var(--green)}

/* LOADING / EMPTY */
.loading{text-align:center;padding:40px;color:var(--tx2);font-size:12px}
.spin{display:inline-block;width:14px;height:14px;border:1.5px solid var(--bd2);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:28px;color:var(--tx3);font-size:12px}
.err{color:var(--coral);font-size:12px;padding:10px 0}
.setup-banner{background:var(--adim);border:1px solid rgba(245,166,35,.2);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--amber);display:none}
.setup-banner.show{display:block}

@media(max-width:900px){
  .g2,.g3{grid-template-columns:1fr}
  main{padding:12px}
  header{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px}
  .kw-sel-wrap{max-width:100%;width:100%}
  .nav{order:3;width:100%}
}
</style>
</head>
<body>

<header>
  <div class="logo">content<em>/</em>radar <em style="font-size:9px;margin-left:3px">tidlor</em></div>
  <div class="kw-sel-wrap">
    <label>Keyword</label>
    <select id="sel-kw" onchange="onKwChange()"><option value="">— เลือก —</option></select>
    <button class="gbtn" id="gbtn" onclick="generate()">Generate Script</button>
  </div>
  <nav class="nav">
    <button class="nb on"  onclick="sp('research')">Research</button>
    <button class="nb"     onclick="sp('script')">Script Ideas</button>
    <button class="nb"     onclick="sp('news')">News Hook</button>
  </nav>
  <button class="rbtn" onclick="loadData()">↻</button>
</header>

<main>
<div id="setup-banner" class="setup-banner">ตั้งค่า APPS_SCRIPT_URL ก่อนใช้งาน</div>

<!-- RESEARCH PAGE -->
<div id="pg-research" class="pg on">
  <div id="research-loading" class="loading"><span class="spin"></span>กำลังโหลดข้อมูล...</div>
  <div id="research-content" style="display:none">

    <!-- Row 1: Related + PAA -->
    <div class="g2">
      <div>
        <div class="sec-label sl-green">Related Searches + Autocomplete</div>
        <div class="box" style="padding:12px 14px"><div class="chips" id="r-chips"></div></div>
      </div>
      <div>
        <div class="sec-label sl-purple">People Also Ask</div>
        <div class="box" style="padding:0 14px"><div id="r-paa"></div></div>
      </div>
    </div>

    <!-- Row 2: AEO + Pain + Top Results -->
    <div class="g3">
      <div>
        <div class="sec-label sl-green">AEO Answers (AI Search Optimized)</div>
        <div class="box" style="padding:0 14px 6px"><div id="r-aeo"></div></div>
      </div>
      <div>
        <div class="sec-label sl-coral">Pain Points</div>
        <div class="box" style="padding:0 14px"><div id="r-pain"></div></div>
      </div>
      <div>
        <div class="sec-label sl-blue">Top Google Results</div>
        <div class="box" style="padding:0 14px"><div id="r-results"></div></div>
      </div>
    </div>

  </div>
  <div id="research-error" class="err" style="display:none"></div>
</div>

<!-- SCRIPT IDEAS PAGE -->
<div id="pg-script" class="pg">
  <div id="script-loading" style="display:none" class="loading"><span class="spin"></span>Gemini กำลังสร้าง script...</div>
  <div id="script-error" class="err" style="display:none"></div>
  <div id="script-content" style="display:none">
    <!-- 4 Pillars rendered here -->
  </div>
  <div id="script-empty" class="empty">เลือก keyword แล้วกด Generate Script ครับ</div>
</div>

<!-- NEWS HOOK PAGE -->
<div id="pg-news" class="pg">
  <div class="sec-label sl-amber">Situation Hook — ข่าววันนี้</div>
  <div class="box" style="padding:0 14px"><div id="n-list"><div class="loading"><span class="spin"></span></div></div></div>
</div>

</main>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxf9J1SytofKXX9vv4HLdJD2eBG1k4nRMZubW0yEgbGbOaDNvzypjN7qhL4q0Nhafy/exec";  // ← วาง Apps Script Web App URL

let DATA = {}, GENERATED = null;

if (!APPS_SCRIPT_URL) document.getElementById('setup-banner').classList.add('show');

// ── Navigation ────────────────────────────────────────────────
function sp(p) {
  document.querySelectorAll('.pg').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(el=>el.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  event.target.classList.add('on');
}

// ── JSONP ─────────────────────────────────────────────────────
function callApi(params, cb) {
  if (!APPS_SCRIPT_URL) { cb(null,'ยังไม่ได้ตั้งค่า URL'); return; }
  const name = 'cb_'+Date.now();
  params.callback = name;
  const qs = Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  window[name] = d => { delete window[name]; sc.remove(); d.success?cb(d.data,null):cb(null,d.error); };
  const sc = Object.assign(document.createElement('script'),{src:APPS_SCRIPT_URL+'?'+qs,onerror:()=>cb(null,'Network error')});
  document.head.appendChild(sc);
}

// ── Load dashboard data ───────────────────────────────────────
function loadData() {
  document.getElementById('research-loading').style.display = 'block';
  document.getElementById('research-content').style.display = 'none';
  callApi({action:'dashboard'}, (d,err) => {
    document.getElementById('research-loading').style.display = 'none';
    if (err) {
      document.getElementById('research-error').style.display='block';
      document.getElementById('research-error').textContent='Error: '+err; return;
    }
    DATA = d;
    populateSel(d.keywords||[]);
    renderNews(d.news||[]);
    // show research with first keyword data
    if ((d.keywords||[]).length) {
      document.getElementById('sel-kw').value = d.keywords[0].keyword;
      renderResearch(d.keywords[0].keyword);
    }
    document.getElementById('research-content').style.display = 'block';
  });
}

function populateSel(kws) {
  const s = document.getElementById('sel-kw');
  const cur = s.value;
  s.innerHTML = '<option value="">— เลือก keyword —</option>' +
    kws.map(k=>`<option value="${esc(k.keyword)}">${k.keyword} (${k.freq}×)</option>`).join('');
  if (cur) s.value = cur;
}

function onKwChange() {
  const kw = document.getElementById('sel-kw').value;
  if (kw) renderResearch(kw);
}

// ── Render Research ───────────────────────────────────────────
function renderResearch(kw) {
  // Chips: autocomplete suggest for this keyword
  const kwData = (DATA.keywords||[]).filter(k=>k.keyword.includes(kw.split(' ')[0])).slice(0,12);
  const allKws = (DATA.keywords||[]).slice(0,16);
  const chips  = allKws.map(k=>
    `<span class="chip" onclick="quickKw('${esc(k.keyword)}')">${k.keyword}</span>`
  ).join('');
  document.getElementById('r-chips').innerHTML = chips || '<span style="color:var(--tx3);font-size:12px">ยังไม่มีข้อมูล</span>';

  // PAA
  const paas = (DATA.paa||[]).filter(p=>p.keyword===kw).slice(0,6);
  if (!paas.length) {
    document.getElementById('r-paa').innerHTML = '<div class="empty">ไม่พบ PAA สำหรับ keyword นี้</div>';
  } else {
    document.getElementById('r-paa').innerHTML = paas.map((p,i)=>`
      <div class="paa-item" onclick="usePaaAsHook('${esc(p.question)}')">
        <span class="paa-num">${i+1}</span>
        <span class="paa-q">${p.question}</span>
      </div>`).join('');
  }

  // AEO — show if generated, else placeholder
  renderAeoPlaceholder(kw);

  // Pain — from PAA questions grouped
  const allPaa = (DATA.paa||[]).filter(p=>p.keyword===kw).slice(0,5);
  if (!allPaa.length) {
    document.getElementById('r-pain').innerHTML = '<div class="empty">กด Generate เพื่อดู Pain Points</div>';
  } else {
    document.getElementById('r-pain').innerHTML = allPaa.map(p=>`
      <div class="pain-item"><div class="pain-dot"></div><div class="pain-text">${p.question}</div></div>
    `).join('');
  }

  // Top Results — from SERP
  const serpData = (DATA.serp||[]).find(s=>s.keyword===kw);
  if (!serpData || !serpData.top3.length) {
    document.getElementById('r-results').innerHTML = '<div class="empty">ไม่พบข้อมูล SERP</div>';
  } else {
    document.getElementById('r-results').innerHTML = serpData.top3.map(r=>`
      <div class="result-item">
        <div class="result-domain">${r.domain}</div>
        <div class="result-title"><a href="${r.url||'#'}" target="_blank">${r.title}</a></div>
        ${r.snippet?`<div class="result-snippet">${r.snippet.slice(0,120)}...</div>`:''}
      </div>`).join('');
  }

  document.getElementById('research-content').style.display = 'block';
}

function renderAeoPlaceholder(kw) {
  if (GENERATED && GENERATED.keyword === kw && GENERATED.aeo_answers) {
    renderAeo(GENERATED.aeo_answers);
  } else {
    document.getElementById('r-aeo').innerHTML = '<div class="empty" style="padding:20px">กด Generate Script เพื่อดู AEO Answers</div>';
  }
}

function renderAeo(aeos) {
  document.getElementById('r-aeo').innerHTML = (aeos||[]).map(a=>`
    <div class="aeo-item" style="margin-top:8px">
      <div class="aeo-q">${a.question||''}</div>
      <div class="aeo-a">${a.answer||''}</div>
    </div>`).join('') || '<div class="empty">ไม่มีข้อมูล</div>';
}

// ── News ──────────────────────────────────────────────────────
function renderNews(news) {
  if (!news.length) { document.getElementById('n-list').innerHTML='<div class="empty">ยังไม่มีข่าว</div>'; return; }
  document.getElementById('n-list').innerHTML = news.map(n=>`
    <div class="news-item">
      <span class="news-label">${n.label}</span>
      <div>
        <div class="news-t">${n.link?`<a href="${n.link}" target="_blank">${n.title}</a>`:n.title}</div>
        <div class="news-src">${n.source||''}</div>
        <button class="use-hook" onclick="useNewsHook('${esc(n.title)}')">ใช้เป็น hook →</button>
      </div>
    </div>`).join('');
}

function useNewsHook(title) {
  document.getElementById('sel-kw').dispatchEvent(new Event('change'));
  // store hook and auto-generate
  window._pendingHook = title;
  if (document.getElementById('sel-kw').value) generate(title);
}

function usePaaAsHook(q) {
  window._pendingHook = q;
}

function quickKw(kw) {
  document.getElementById('sel-kw').value = kw;
  renderResearch(kw);
}

// ── Generate 4 Pillars ────────────────────────────────────────
function generate(hookOverride) {
  const kw   = document.getElementById('sel-kw').value;
  const hook = hookOverride || window._pendingHook || '';
  if (!kw) { alert('กรุณาเลือก keyword ก่อนครับ'); return; }

  // switch to script page
  sp('script');
  document.querySelectorAll('.nb').forEach((el,i)=>el.classList.toggle('on',i===1));

  document.getElementById('script-loading').style.display = 'block';
  document.getElementById('script-content').style.display = 'none';
  document.getElementById('script-empty').style.display   = 'none';
  document.getElementById('script-error').style.display   = 'none';
  document.getElementById('gbtn').disabled = true;

  callApi({action:'generate', keyword:kw, hook:hook}, (res,err) => {
    document.getElementById('script-loading').style.display = 'none';
    document.getElementById('gbtn').disabled = false;
    window._pendingHook = '';
    if (err) {
      document.getElementById('script-error').style.display='block';
      document.getElementById('script-error').textContent='Error: '+err; return;
    }
    GENERATED = { ...res, keyword: kw };
    renderScripts(res, kw);
    renderAeo(res.aeo_answers);
    // update pain if available
    if (res.pain_points) {
      document.getElementById('r-pain').innerHTML = (res.pain_points||[]).map(p=>`
        <div class="pain-item"><div class="pain-dot"></div><div class="pain-text">${p}</div></div>`).join('');
    }
    document.getElementById('script-content').style.display = 'block';
  });
}

// ── Render 4 Pillar Scripts ───────────────────────────────────
const PILLARS = [
  {key:'high_intent', label:'High Intent',  color:'var(--coral)',  slcls:'sl-coral'},
  {key:'fin_ed',      label:'Fin-ed',        color:'var(--green)',  slcls:'sl-green'},
  {key:'seasonal',    label:'Seasonal',      color:'var(--purple)', slcls:'sl-purple'},
  {key:'realtime',    label:'News Hook',     color:'var(--amber)',  slcls:'sl-amber'},
];

function renderScripts(r, kw) {
  const html = PILLARS.map(p => {
    const d = r[p.key] || {};
    return `
      <div class="pillar-wrap">
        <div class="pillar-head">
          <div class="sec-label ${p.slcls}">${p.label}</div>
          <div class="pillar-topic">${d.topic||''}</div>
          <div class="gen-toggle" id="toggle-${p.key}">
            <button class="gtab on" onclick="swGen(this,'gy-${p.key}','toggle-${p.key}')">Gen Y</button>
            <button class="gtab"    onclick="swGen(this,'gz-${p.key}','toggle-${p.key}')">Gen Z</button>
          </div>
        </div>
        <div id="gy-${p.key}" class="gpanel on">${mkScript(p.key,'y',d.gen_y,kw)}</div>
        <div id="gz-${p.key}" class="gpanel">${mkScript(p.key,'z',d.gen_z,kw)}</div>
      </div>`;
  }).join('');
  document.getElementById('script-content').innerHTML = html;
}

function swGen(btn, panelId, toggleId) {
  document.querySelectorAll('#'+toggleId+' .gtab').forEach(b=>b.classList.remove('on'));
  const wrap = document.getElementById(panelId).closest('.pillar-wrap');
  wrap.querySelectorAll('.gpanel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(panelId).classList.add('on');
}

function mkScript(key, gen, s, kw) {
  if (!s) return '<div class="empty">ไม่มีข้อมูล</div>';
  const id  = key+gen+Date.now();
  const kwPills = (s.seo_keywords||[kw]).map(k=>`<span class="kw-pill">${k}</span>`).join('');
  const hashPills = (s.hashtags||[]).map(h=>`<span class="hash-pill">${h}</span>`).join('');
  const full = `[Hook]\n${s.hook}\n\n[Script 1 นาที]\n${s.script}\n\n[SEO Keywords]\n${(s.seo_keywords||[]).join(', ')}\n\n[Hashtags]\n${(s.hashtags||[]).join(' ')}`;
  return `
    <div class="script-grid">
      <div class="script-row">
        <div class="script-row-label" style="color:var(--amber)">Hook<br><span style="font-size:8px;color:var(--tx3)">3–5 วินาที</span></div>
        <div class="script-row-val"><div class="hook-val">"${s.hook||''}"</div></div>
      </div>
      <div class="script-row">
        <div class="script-row-label">Script<br><span style="font-size:8px;color:var(--tx3)">1 นาที</span></div>
        <div class="script-row-val"><div class="script-val">${s.script||''}</div></div>
      </div>
      <div class="script-row">
        <div class="script-row-label">SEO<br><span style="font-size:8px;color:var(--tx3)">Keywords</span></div>
        <div class="script-row-val"><div class="kw-val">${kwPills||`<span class="kw-pill">${kw}</span>`}</div></div>
      </div>
      <div class="script-row">
        <div class="script-row-label">Hashtags</div>
        <div class="script-row-val"><div class="hash-val">${hashPills}</div></div>
      </div>
    </div>
    <div class="copy-row">
      <button class="cpybtn" onclick="cpy('${id}',\`${full.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)">copy script</button>
    </div>`;
}

function cpy(id, txt) {
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector(`[onclick*="${id}"]`);
    if(b){b.textContent='copied!';setTimeout(()=>b.textContent='copy script',1800);}
  });
}

function esc(s){return String(s).replace(/'/g,"\\'").replace(/`/g,'\\`');}

window.onload = loadData;
</script>
</body>
</html>
